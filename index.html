<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>TC Avatar — View & animate VRM avatars in your browser</title>
    <meta
      name="description"
      content="A fast, private, browser-based viewer for VRM avatar models. Load .vrm files, inspect metadata, tweak expressions, and import from tc-storage — nothing leaves your device."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0d9488" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0b0c10" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph / social -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TC Avatar" />
    <meta
      property="og:description"
      content="A fast, private, browser-based viewer for VRM avatar models."
    />
    <meta name="twitter:card" content="summary" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Set the theme before first paint to avoid a flash. Default is light. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('tcvrm-theme')
          // 'system' and unset stay attribute-less so the prefers-color-scheme fallback in styles.css applies.
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.dataset.theme = stored
          }
        } catch (e) {
          /* storage may be unavailable (private mode); fall through to the prefers-color-scheme fallback */
        }
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
